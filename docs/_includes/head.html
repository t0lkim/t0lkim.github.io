<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
{% if page.keywords %}<meta name="keywords" content="{{ page.keywords }}">{% endif %}
<meta name="author" content="Mike Lott">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#00C9A7">

<!-- Canonical -->
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:type" content="{% if page.layout == 'profile' %}profile{% else %}article{% endif %}">
<meta property="og:locale" content="en_SG">
{% if page.image %}<meta property="og:image" content="{{ page.image | absolute_url }}">{% endif %}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
{% if page.image %}<meta name="twitter:image" content="{{ page.image | absolute_url }}">{% endif %}

<!-- Stylesheets -->
<link rel="stylesheet" href="{{ '/assets/css/base.css' | relative_url }}">
{% if page.css %}<link rel="stylesheet" href="{{ page.css | relative_url }}">{% endif %}
{% if page.extra_css %}<style>{{ page.extra_css }}</style>{% endif %}
