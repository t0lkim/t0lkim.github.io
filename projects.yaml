      **Language:** Go | **Authentication:** Browser cookie extraction

  - name: MMM (MyMediaManager)
    slug: mmm
    title: "MMM (MyMediaManager) — Case Study"
    description: "A Rust CLI for organising images and videos with deduplication, EXIF-based renaming, and date-based directory structure."
    keywords: "MMM, MyMediaManager, media organiser, Rust CLI, EXIF, deduplication, photo management"
    language: Rust
    category: Media Organisation
    css: teentidal.css
    sitemap_priority: "0.8"
    faq:
      - q: "What is MMM?"
        a: "MMM (MyMediaManager) is a Rust CLI for organising images and videos with deduplication, EXIF-based renaming, and date-based directory structure."
      - q: "How does MMM organise media?"
        a: "MMM reads EXIF metadata from media files, renames them with date-based conventions, deduplicates by content hash, and organises into a clean date-based directory structure."
    llms_summary: "Image/video organiser with deduplication and EXIF-based renaming. Built in Rust."
    llms_full: |
      **What is MMM?** MMM (MyMediaManager) is a Rust CLI for organising images and videos with deduplication, EXIF-based renaming, and date-based directory structure.

      **What problem does MMM solve?** Photos and videos accumulate across phones, cameras, SD cards, and cloud downloads. The same image exists in multiple places under different names. Camera-assigned filenames carry no meaningful information. Manual sorting is impractical at scale.

      **How does MMM work?** MMM reads EXIF metadata from media files, renames them with date-based conventions, deduplicates by content hash, and organises into a clean date-based directory structure.

      **Language:** Rust | **Category:** Media Organisation

